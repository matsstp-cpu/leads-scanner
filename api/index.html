<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LEAD_SCANNER // ENTERPRISE_REED</title>
    <style>
        :root { --bg: #050505; --accent: #ff3366; --border: #222; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; padding: 20px; }
        .header { border-bottom: 2px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; }
        .controls { position: sticky; top: 0; background: #000; padding: 20px; border: 1px solid var(--border); z-index: 100; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: transparent; border: 1px solid #444; color: #00ffcc; padding: 12px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #stopBtn { background: #444; display: none; }
        .stats { margin: 10px 0; font-size: 14px; color: #aaa; background: #111; padding: 10px; border-left: 3px solid #00ffcc; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; font-size: 13px; }
        th { background: #151515; color: var(--accent); position: sticky; top: 100px; }
        a { color: #00ffcc; text-decoration: none; font-weight: bold; }
        #loader { display: none; color: var(--accent); margin-left: 10px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>LEAD_SCANNER_v4.0 // OFFICIAL_REED_MODE</h1>
    </div>
    
    <div class="controls">
        <input type="text" id="q" placeholder="ОКВЭД ИЛИ ОТРАСЛЬ (НАПР: 62.01 МОСКВА)">
        <button id="startBtn" onclick="startBulkSearch()">НАЧАТЬ СБОР 1000+</button>
        <button id="stopBtn" onclick="stopSearch()">СТОП</button>
        <button onclick="downloadCSV()" style="background:#0066ff">EXCEL / CSV</button>
        <div id="loader">_SCANNING...</div>
    </div>

    <div class="stats">РЕЕСТР ЗАГРУЖЕН: <span id="count" style="color:#00ffcc; font-weight:bold;">0</span> / 1000 КОМПАНИЙ</div>

    <table id="tbl">
        <thead>
            <tr>
                <th>ИНН</th>
                <th>ОРГАНИЗАЦИЯ (COMPANIUM)</th>
                <th>ГОРОД</th>
                <th>ОКВЭД</th>
                <th>ОГРН</th>
            </tr>
        </thead>
        <tbody id="body"></tbody>
    </table>

    <script>
        let allLeads = new Map();
        let isRunning = false;

        async function startBulkSearch() {
            const query = document.getElementById('q').value;
            if(!query) return;

            isRunning = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('loader').style.display = 'inline-block';

            let offset = 0;
            
            while(isRunning && allLeads.size < 1000) {
                try {
                    const response = await fetch('/api', {
                        method: 'POST',
                        body: JSON.stringify({ query, offset })
                    });
                    const data = await response.json();
                    
                    if(!data.leads || data.leads.length === 0) {
                        alert("Реестр закончился или достигнут лимит выдачи.");
                        break;
                    }

                    data.leads.forEach(l => {
                        if(!allLeads.has(l.inn)) {
                            allLeads.set(l.inn, l);
                            addTableRow(l);
                        }
                    });

                    document.getElementById('count').innerText = allLeads.size;
                    offset += 20; 
                    
                    // Пауза для стабильности
                    await new Promise(r => setTimeout(r, 400)); 

                } catch (e) {
                    console.error("Ошибка шага:", e);
                    break;
                }
            }
            stopSearch();
        }

        function addTableRow(l) {
            const row = `<tr>
                <td style="color:#666">${l.inn}</td>
                <td><a href="https://companium.ru/id/${l.inn}" target="_blank">${l.name}</a></td>
                <td>${l.city}</td>
                <td>${l.okved}</td>
                <td style="color:#444">${l.ogrn}</td>
            </tr>`;
            document.getElementById('body').insertAdjacentHTML('beforeend', row);
        }

        function stopSearch() {
            isRunning = false;
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'none';
        }

        function downloadCSV() {
            let csv = '\uFEFFИНН,Компания,Город,ОКВЭД,ОГРН\n';
            allLeads.forEach(l => {
                csv += `${l.inn},"${l.name}","${l.city}","${l.okved}","${l.ogrn}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `REED_EXPORT_${new Date().getTime()}.csv`;
            a.click();
        }
    </script>
</body>
</html>
