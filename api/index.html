<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LEAD_SCANNER // PRO</title>
    <style>
        :root { --bg: #0a0a0a; --text: #e0e0e0; --accent: #ff3366; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: monospace; padding: 30px; display: flex; flex-direction: column; align-items: center; }
        .panel { display: flex; gap: 10px; margin: 20px 0; width: 100%; max-width: 900px; }
        input { flex: 1; background: transparent; border: 1px solid var(--border); color: #fff; padding: 12px; }
        button { background: var(--accent); color: #fff; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; }
        .export-btn { background: #444; display: none; }
        table { width: 100%; max-width: 1200px; border-collapse: collapse; display: none; margin-top: 20px; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; font-size: 13px; }
        th { color: var(--accent); background: #111; }
        a { color: #00ffcc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        #loader { display: none; color: var(--accent); }
    </style>
</head>
<body>
    <h1>Lead_Scanner</h1>
    <div class="panel">
        <input type="text" id="q" placeholder="ОКВЭД или сфера деятельности">
        <button onclick="search()">Найти</button>
        <button id="ex" class="export-btn" onclick="download()">Скачать CSV</button>
    </div>
    <div id="loader">Ищу компании и ОКВЭДы...</div>
    <table id="tbl">
        <thead>
            <tr>
                <th>ИНН</th>
                <th>Компания (ссылка на контакты)</th>
                <th>Город</th>
                <th>ОКВЭД</th>
                <th>Рейтинг</th>
            </tr>
        </thead>
        <tbody id="body"></tbody>
    </table>

    <script>
        let leads = [];
        async function search() {
            const query = document.getElementById('q').value;
            if(!query) return;
            document.getElementById('loader').style.display = 'block';
            try {
                const r = await fetch('/api', {
                    method: 'POST',
                    body: JSON.stringify({ query })
                });
                const d = await r.json();
                leads = d.leads;
                let h = '';
                leads.forEach(l => {
                    // Создаем ссылку на Rusprofile по ИНН для быстрого поиска контактов
                    const searchLink = `https://www.rusprofile.ru/search?query=${l.inn}`;
                    h += `<tr>
                        <td>${l.inn}</td>
                        <td><a href="${searchLink}" target="_blank"><strong>${l.name}</strong></a></td>
                        <td>${l.city}</td>
                        <td>${l.okved}</td>
                        <td>${l.score}/10</td>
                    </tr>`;
                });
                document.getElementById('body').innerHTML = h;
                document.getElementById('tbl').style.display = 'table';
                document.getElementById('ex').style.display = 'inline-block';
            } catch (e) { alert('Ошибка'); }
            document.getElementById('loader').style.display = 'none';
        }

        function download() {
            let csv = '\uFEFFИНН,Компания,Город,ОКВЭД,Рейтинг\n';
            leads.forEach(l => { csv += `${l.inn},"${l.name}","${l.city}","${l.okved}",${l.score}\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "leads_list.csv";
            a.click();
        }
    </script>
</body>
</html>
