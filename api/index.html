<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LEAD_SCANNER // PLATFORM</title>
    <style>
        :root { --bg: #050505; --text: #ffffff; --accent: #ff3366; --gray: #151515; --border: #2a2a2a; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 40px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 20px; text-transform: uppercase; letter-spacing: 3px; border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 30px; }
        
        .search-box { display: flex; gap: 0; background: var(--gray); padding: 10px; border: 1px solid var(--border); margin-bottom: 30px; }
        input { flex: 1; background: transparent; border: 1px solid #333; color: #00ffcc; padding: 15px; font-size: 16px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 0 35px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #fff; color: #000; }
        .export-btn { background: #333; margin-left: 10px; display: none; }

        table { width: 100%; border-collapse: collapse; display: none; margin-top: 10px; border: 1px solid var(--border); }
        th { background: #111; color: var(--accent); text-align: left; padding: 15px; font-size: 11px; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        tr:hover { background: #0a0a0a; }
        
        a.company-link { color: #00ffcc; text-decoration: none; font-weight: bold; }
        a.company-link:hover { color: #fff; text-decoration: underline; }
        
        .status-active { color: #00ffcc; }
        .status-closed { color: #ff3366; }
        #loader { display: none; color: var(--accent); margin-bottom: 15px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LEAD_SCANNER // VERSION_2.0</h1>
        
        <div class="search-box">
            <input type="text" id="q" placeholder="ВВЕДИТЕ ОКВЭД, ОТРАСЛЬ ИЛИ ИНН...">
            <button onclick="search()">SCAN</button>
            <button id="ex" class="export-btn" onclick="download()">SAVE CSV</button>
        </div>

        <div id="loader">>> ЗАПРОС К БАЗЕ ДАННЫХ...</div>

        <table id="tbl">
            <thead>
                <tr>
                    <th>ИНН</th>
                    <th>КОМПАНИЯ (COMPANIUM.RU)</th>
                    <th>ГОРОД</th>
                    <th>ОКВЭД</th>
                    <th>СТАТУС</th>
                </tr>
            </thead>
            <tbody id="body"></tbody>
        </table>
    </div>

    <script>
        let leads = [];

        async function search() {
            const query = document.getElementById('q').value;
            if(!query) return;
            
            document.getElementById('loader').style.display = 'block';
            document.getElementById('tbl').style.display = 'none';

            try {
                const r = await fetch('/api', {
                    method: 'POST',
                    body: JSON.stringify({ query })
                });
                const d = await r.json();
                leads = d.leads || [];

                let h = '';
                leads.forEach(l => {
                    // Формируем прямую ссылку на Компаниум по ИНН
                    const compUrl = `https://companium.ru/id/${l.inn}`;
                    const statusClass = l.score > 5 ? 'status-active' : 'status-closed';
                    
                    h += `<tr>
                        <td style="color: #666;">${l.inn}</td>
                        <td><a href="${compUrl}" target="_blank" class="company-link">${l.name}</a></td>
                        <td>${l.city}</td>
                        <td style="font-size: 11px;">${l.okved}</td>
                        <td class="${statusClass}">${l.status}</td>
                    </tr>`;
                });

                document.getElementById('body').innerHTML = h;
                document.getElementById('tbl').style.display = 'table';
                document.getElementById('ex').style.display = 'inline-block';
            } catch (e) { 
                alert('SYSTEM ERROR: ПОПРОБУЙТЕ ПОЗЖЕ'); 
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function download() {
            let csv = '\uFEFFИНН,Компания,Город,ОКВЭД,Статус\n';
            leads.forEach(l => {
                csv += `${l.inn},"${l.name}","${l.city}","${l.okved}",${l.status}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `leads_extract_${l.inn}.csv`;
            a.click();
        }
    </script>
</body>
</html>
