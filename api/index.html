.export-btn { background: #555; margin-left: 10px; display: none; }

<div class="control-panel">
    <input type="text" id="queryInput" placeholder="ОКВЭД или название отрасли">
    <button onclick="generateLeads()">Найти</button>
    <button id="exportBtn" class="export-btn" onclick="downloadCSV()">Скачать CSV</button>
</div>

<th>Город</th>

<script>
    let currentLeads = []; // Хранилище для экспорта

    async function generateLeads() {
        const query = document.getElementById('queryInput').value;
        if (!query) return;
        document.getElementById('loader').style.display = 'block';
        
        try {
            const response = await fetch('/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });
            const data = await response.json();
            currentLeads = data.leads;
            
            let html = '';
            currentLeads.forEach(lead => {
                html += `<tr>
                    <td>${lead.inn}</td>
                    <td>${lead.name}</td>
                    <td>${lead.city}</td>
                    <td>${lead.description}</td>
                    <td>${lead.site}</td>
                    <td class="${lead.score >= 7 ? 'score-high' : 'score-low'}">${lead.score}</td>
                </tr>`;
            });
            document.getElementById('tableBody').innerHTML = html;
            document.getElementById('resultsTable').style.display = 'table';
            document.getElementById('exportBtn').style.display = 'inline-block';
        } catch (e) { alert('Ошибка'); }
        finally { document.getElementById('loader').style.display = 'none'; }
    }

    function downloadCSV() {
        let csv = 'ИНН,Компания,Город,ОКВЭД\n';
        currentLeads.forEach(l => {
            csv += `${l.inn},"${l.name}","${l.city}",${l.description}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "leads_export.csv";
        link.click();
    }
</script>
