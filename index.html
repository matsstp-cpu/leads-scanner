<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEAD_SCANNER // PLATFORM</title>
    <style>
        :root { --bg: #0a0a0a; --text: #e0e0e0; --accent: #ff3366; --border: #333; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        h1 { text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .control-panel { display: flex; gap: 15px; margin: 30px 0; width: 100%; max-width: 800px; }
        input { flex: 1; background: transparent; border: 1px solid var(--border); color: var(--text); padding: 15px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: #fff; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #fff; color: #000; }
        table { width: 100%; max-width: 1200px; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; font-size: 14px; }
        th { background: #1a1a1a; color: var(--accent); }
        .score-high { color: #00ffcc; font-weight: bold; }
        .score-low { color: #ff3333; }
        #loader { display: none; color: var(--accent); margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Lead_Scanner</h1>
    <div class="control-panel">
        <input type="text" id="queryInput" placeholder="Введите ОКВЭД (например, 62.01) или отрасль">
        <button onclick="generateLeads()">Найти компании</button>
    </div>
    <div id="loader">Сканирую базы данных...</div>
    <table id="resultsTable" style="display:none;">
        <thead>
            <tr>
                <th>ИНН</th>
                <th>Компания</th>
                <th>Описание / ОКВЭД</th>
                <th>Контакты</th>
                <th>Рейтинг (0-10)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        async function generateLeads() {
            const query = document.getElementById('queryInput').value;
            if (!query) return;
            document.getElementById('loader').style.display = 'block';
            document.getElementById('resultsTable').style.display = 'none';
            document.getElementById('tableBody').innerHTML = '';

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await response.json();
                
                data.leads.forEach(lead => {
                    const row = `<tr>
                        <td>${lead.inn}</td>
                        <td><strong>${lead.name}</strong></td>
                        <td>${lead.description}</td>
                        <td>📞 ${lead.phone}<br>✉️ ${lead.email}</td>
                        <td class="${lead.score >= 7 ? 'score-high' : 'score-low'}">${lead.score} / 10</td>
                    </tr>`;
                    document.getElementById('tableBody').insertAdjacentHTML('beforeend', row);
                });
                document.getElementById('resultsTable').style.display = 'table';
            } catch (error) {
                alert('Ошибка сервера.');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
